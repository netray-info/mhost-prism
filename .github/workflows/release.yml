name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------------------
  # Gate: run the full test suite before spending time on a Docker build.
  # ---------------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      # Cache ~/.cargo/registry, ~/.cargo/git, and target/ across runs.
      - uses: Swatinem/rust-cache@v2

      - name: cargo test
        run: cargo test --locked

  # ---------------------------------------------------------------------------
  # Build the Docker image and push to GitHub Container Registry.
  # ---------------------------------------------------------------------------
  docker:
    name: Docker
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      # Generate image tags and OCI labels from git metadata.
      # On a tag push (v1.2.3):  1.2.3 / 1.2 / latest
      # On workflow_dispatch from a tag: same
      # On workflow_dispatch from a branch: short SHA only (no latest)
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}
            type=sha,prefix=,format=short

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
