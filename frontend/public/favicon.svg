<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#0f1117"/>

  <!-- Prism triangle -->
  <polygon points="16,6 26,24 6,24" fill="none" stroke="#a78bfa" stroke-width="1.5" stroke-linejoin="round" opacity="0.7"/>

  <!-- Incoming ray -->
  <line x1="4" y1="14" x2="12.5" y2="14" stroke="#a78bfa" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>

  <!-- Refracted rays fanning out -->
  <line x1="21" y1="11" x2="28" y2="8"  stroke="#c4b5fd" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
  <line x1="21" y1="14" x2="28" y2="14" stroke="#a78bfa" stroke-width="1.2" stroke-linecap="round" opacity="0.8"/>
  <line x1="21" y1="17" x2="28" y2="20" stroke="#8b5cf6" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>

  <!-- Center glow dot -->
  <circle cx="16" cy="15" r="2" fill="#a78bfa" opacity="0.9"/>
</svg>
