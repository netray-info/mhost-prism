# Development configuration — relaxed limits for local testing.
# Used by `make dev`.

[limits]
per_ip_per_minute = 600
per_ip_burst = 64
per_target_per_minute = 300
per_target_burst = 50
global_per_minute = 5000
global_burst = 200
per_ip_max_streams = 20

[dns]
allow_system_resolvers = true
allow_arbitrary_servers = true
