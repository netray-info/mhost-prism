# prism configuration
#
# All values shown are the built-in defaults. Uncomment and edit to override.
# Environment variables take precedence over this file:
#   PRISM_SERVER__BIND=0.0.0.0:8080
#   PRISM_LIMITS__PER_IP_PER_MINUTE=200
#   PRISM_DNS__ALLOW_ARBITRARY_SERVERS=true

# Display name shown in the UI header, footer, and page title.
# Default: "prism"
#site_name = "prism"

# ---------------------------------------------------------------------------
# [server] — HTTP server settings
# ---------------------------------------------------------------------------
[server]

# Address and port for the API / frontend server.
#bind = "127.0.0.1:8081"

# Address and port for the Prometheus metrics endpoint.
#metrics_bind = "127.0.0.1:9091"

# Trusted reverse proxies (individual IPs or CIDR ranges).
# When a request arrives from a trusted proxy, the real client IP is extracted
# from X-Forwarded-For / X-Real-IP / CF-Connecting-IP headers.
# Examples: ["10.0.0.1"], ["10.0.0.0/8", "fd00::/8"]
# Leave empty to trust no proxies (peer IP is always used).
#trusted_proxies = []

# ---------------------------------------------------------------------------
# [limits] — Rate limiting and query restrictions
# ---------------------------------------------------------------------------
[limits]

# GCRA rate limit: total query-cost tokens per client IP per minute.
# Query cost = record_types x servers (number of DNS lookups issued).
#per_ip_per_minute = 120

# Maximum tokens a single request can consume in one burst.
# Must accommodate combined mode costs: check(16) + trace(16) + dnssec(16) = 48,
# plus a background query (up to 10×4 = 40). Default 64 gives headroom above both.
#per_ip_burst = 64

# GCRA rate limit: query-cost tokens per DNS target (provider/server) per minute.
# Each target is only charged its share: record_types (not the full query cost).
#per_target_per_minute = 60

# Per-target burst size. Must be >= the largest single-request per-target cost:
#   regular queries: up to max_record_types (10); check endpoint: 16 (15 types + DMARC).
#per_target_burst = 20

# GCRA rate limit: total query-cost tokens across all clients per minute.
#global_per_minute = 1000

# Global burst size.
#global_burst = 50

# Maximum concurrent TCP connections to the API server.
#max_concurrent_connections = 256

# Maximum concurrent SSE streams per client IP.
#per_ip_max_streams = 10

# Maximum per-query timeout in seconds (hard cap: 10).
#max_timeout_secs = 10

# Maximum number of record types per query (hard cap: 10).
#max_record_types = 10

# Maximum number of servers per query (hard cap: 4).
#max_servers = 4

# ---------------------------------------------------------------------------
# [circuit_breaker] — Per-provider circuit breaker
# ---------------------------------------------------------------------------
[circuit_breaker]

# Sliding window duration for error-rate tracking.
#window_secs = 60

# How long the breaker stays open before allowing a probe request.
#cooldown_secs = 30

# Error rate (exclusive, in (0.0, 1.0]) at which the breaker trips.
#failure_threshold = 0.5

# Minimum requests in the window before the threshold is evaluated.
#min_requests = 5

# ---------------------------------------------------------------------------
# [trace] — DNS delegation trace settings
# ---------------------------------------------------------------------------
[trace]

# Maximum number of delegation hops before stopping (hard cap: 20).
#max_hops = 10

# Per-query timeout (seconds) for each raw DNS request in the trace (hard cap: 10).
#query_timeout_secs = 3

# ---------------------------------------------------------------------------
# [dns] — DNS resolver settings
# ---------------------------------------------------------------------------
[dns]

# Default servers used when no @server is specified in the query.
# Values: predefined provider names (cloudflare, google, quad9, etc.).
#default_servers = ["cloudflare"]

# Allow @system to use the OS-configured resolvers.
#allow_system_resolvers = true

# Allow @<ip> to query arbitrary IP addresses.
# When false, only predefined providers and @system are accepted.
#allow_arbitrary_servers = false

# ---------------------------------------------------------------------------
# [ecosystem] — Public URLs for cross-tool navigation (served to browser)
# ---------------------------------------------------------------------------
#[ecosystem]
#ip_base_url = "https://ip.example.com"
#dns_base_url = "https://dns.example.com"
#tls_base_url = "https://tls.example.com"
#http_base_url = "https://http.example.com"
#email_base_url = "https://email.example.com"
#lens_base_url = "https://lens.example.com"

# ---------------------------------------------------------------------------
# [backends.ip] — IP enrichment backend (internal service-to-service)
# ---------------------------------------------------------------------------
#[backends.ip]
#url = "http://ifconfig-rs:8000"
#timeout_ms = 500
#max_concurrent = 20
#cache_ttl_secs = 300
#cache_capacity = 1024

# ---------------------------------------------------------------------------
# [telemetry] — Logging and distributed tracing
# ---------------------------------------------------------------------------
[telemetry]

# Log output format.
#   "text" — human-readable, colour-coded (default; best for terminals)
#   "json" — structured JSON lines (best for log aggregators: Loki, Datadog, etc.)
# Also configurable via: PRISM_TELEMETRY__LOG_FORMAT=json
#log_format = "text"

# Enable OpenTelemetry distributed tracing (OTLP/HTTP export).
#enabled = false

# OTLP HTTP endpoint to export spans to.
#otlp_endpoint = "http://localhost:4318"

# Service name reported in spans and logs.
#service_name = "prism"

# Trace sampling rate (0.0 = off, 1.0 = 100%, any value in between for ratio sampling).
#sample_rate = 1.0
